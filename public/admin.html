<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>SUP Admin</title>

<style>

body{
font-family:Arial;
margin:40px;
}

#login{
max-width:300px;
margin-bottom:30px;
}

input{
padding:8px;
width:100%;
margin-bottom:10px;
}

button{
padding:8px 12px;
cursor:pointer;
}

table{
border-collapse:collapse;
width:100%;
margin-top:20px;
}

td,th{
border:1px solid #ccc;
padding:8px;
}

.delete{
background:red;
color:white;
border:none;
}

</style>

</head>

<body>

<h1>SUP Admin</h1>

<div id="login">

<h3>Admin Login</h3>

<input id="adminKey" type="password" placeholder="Admin Schlüssel">

<button onclick="login()">Login</button>

</div>

<table id="table" style="display:none">

<thead>
<tr>
<th>Datum</th>
<th>Zeit</th>
<th>SUP</th>
<th>Appartement</th>
<th>Name</th>
<th>Löschen</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script>

let adminKey=""

function login(){

adminKey=document.getElementById("adminKey").value

if(!adminKey){
alert("Schlüssel eingeben")
return
}

document.getElementById("login").style.display="none"
document.getElementById("table").style.display="table"

loadBookings()

}

async function loadBookings(){

const res=await fetch("/api/bookings")
const data=await res.json()

const tbody=document.querySelector("tbody")
tbody.innerHTML=""

data.forEach(b=>{

const tr=document.createElement("tr")

tr.innerHTML=`
<td>${b.datum}</td>
<td>${b.von} - ${b.bis}</td>
<td>${b.sup}</td>
<td>${b.appartement}</td>
<td>${b.nachname}</td>
<td><button class="delete" onclick="deleteBooking(${b.id})">X</button></td>
`

tbody.appendChild(tr)

})

}

async function deleteBooking(id){

if(!confirm("Buchung löschen?")) return

const res=await fetch("/api/admin/delete/"+id,{
method:"DELETE",
headers:{
"X-ADMIN-KEY":adminKey
}
})

const result=await res.json()

if(!res.ok){
alert(result.error || "Nicht erlaubt")
return
}

loadBookings()

}

</script>

</body>
</html>
